      type: object
      properties:
        action:
          type: string
          description: "Accion fija"
        phone:
          type: string
          description: "Numero de telefono a quitar de opt-out"
      required: ["action", "phone"]

    RemoveWhatsappProfilePictureArgs:
      description: |
        **remove_whatsapp_profile_picture** [automation] (mutation)
        Elimina la foto de perfil de una sesion de WhatsApp
        ⚠️ Requires confirmation
      type: object
      properties:
        action:
          type: string
          description: "Accion fija"
        session_id:
          type: integer
          description: "ID de la sesion de WhatsApp"
      required: ["action", "session_id"]

    ReorderWhatsappWorkflowsArgs:
      description: |
        **reorder_whatsapp_workflows** [automation] (mutation)
