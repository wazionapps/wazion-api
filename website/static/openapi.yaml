      type: object
      properties:
        action:
          type: string
        order:
          type: array
          description: "Array de objetos {id, priority} con el nuevo orden de los workflows"
      required: ["action", "order"]

    RepublishFaqArgs:
      description: |
        **republish_faq** [plugins] (mutation)
        Republica una o varias FAQs previamente despublicadas
      type: object
      properties:
        action:
          type: string
          description: "Accion fija"
        faq_ids:
          type: array
          description: "IDs de las FAQs a republicar"
      required: ["action", "faq_ids"]

    RequestReferralPayoutArgs:
      description: |
        **request_referral_payout** [referrals] (mutation)
        Solicita el pago de las comisiones pendientes (mínimo 50€). Solo disponible si no hay otra solicitud abierta.
        ⚠️ Requires confirmation
      type: object

    ResetCrmErrorsArgs:
      description: |
        **reset_crm_errors** [advanced] (mutation)
        Resetea el contador de errores CRM y reactiva los endpoints si estaban deshabilitados por errores consecutivos
        ⚠️ Requires confirmation
      type: object
      properties:
        action:
          type: string
      required: ["action"]

    ResolveEmailContactArgs:
      description: |
        **resolve_email_contact** [email] (query)
        Busca la direccion de email asociada a un contacto de WhatsApp usando CRM y plataforma e-commerce
      type: object
      properties:
        phone_hash:
          type: string
          description: "Hash del telefono del contacto"
      required: ["phone_hash"]

    ResolveKnowledgeConflictArgs:
      description: |
        **resolve_knowledge_conflict** [knowledge] (mutation)
        Resuelve un conflicto entre snippets de conocimiento eligiendo cual mantener
      type: object
      properties:
        action:
          type: string
          description: "Accion fija"
        id:
          type: integer
          description: "ID del snippet en conflicto"
        keep_id:
          type: integer
          description: "ID del snippet a mantener"
      required: ["action", "id", "keep_id"]

    RestoreDefaultPromptArgs:
      description: |
        **restore_default_prompt** [prompt] (query)
        Obtiene el prompt por defecto segun el idioma
      type: object

    ResumeCampaignArgs:
      description: |
        **resume_campaign** [mass_marketing] (mutation)
        Reanuda una campana de marketing masivo que fue pausada
      type: object
      properties:
        action:
          type: string
          description: "Accion fija: resume"
        campaign_id:
          type: integer
          description: "ID de la campana a reanudar"
      required: ["action", "campaign_id"]

    RetryEmailAccountArgs:
      description: |
        **retry_email_account** [email] (mutation)
        Resetea el estado de error de una cuenta de email y reintenta la conexion. Util cuando una cuenta esta en estado de error tras fallos de IMAP/SMTP.
      type: object
      properties:
        action:
          type: string
        id:
          type: integer
          description: "ID de la cuenta de email a reintentar"
      required: ["action", "id"]

    RollbackPromptArgs:
      description: |
        **rollback_prompt** [prompt] (mutation)
        Revierte la parte autogenerada del prompt a una version anterior del historial. La parte personalizada del usuario se mantiene. FLUJO DE CONFIRMACION: Esta accion devolvera requires_confirmation=true con success=false - esto NO es un error, es el flujo normal. Cuando recibas esto, describe brevemente al usuario que version se va a restaurar y PARA. NO llames de nuevo a esta accion. El sistema mostrara botones automaticamente.
        ⚠️ Requires confirmation
      type: object
      properties:
        version_id:
          type: integer
          description: "ID de la version a restaurar. Obtenerlo llamando a get_prompt_history primero"
      required: ["version_id"]

    SaveAgentPermissionsArgs:
      description: |
        **save_agent_permissions** [agents] (mutation)
        Actualiza los permisos de un agente. Enviar null para dar todos los permisos, o un objeto con los permisos especificos en true/false
        ⚠️ Requires confirmation
      type: object
      properties:
        action:
          type: string
        id:
          type: integer
          description: "ID del agente"
        permissions:
          type: object_or_null
          description: "Objeto con permisos (ej: {"ai_generate": true, "notes_view": true, "crm_edit": false}). null = todos los permisos"
      required: ["action", "id", "permissions"]

    SaveAsWhatsappTemplateArgs:
      description: |
        **save_as_whatsapp_template** [whatsapp_ops] (mutation)
        Guarda un mensaje como plantilla reutilizable de WhatsApp
      type: object
      properties:
        action:
          type: string
          description: "Accion fija"
        name:
          type: string
          description: "Nombre de la plantilla"
        category:
          type: string
          description: "Categoria de la plantilla"
        workflow_id:
          type: integer
          description: "ID del workflow del que extraer el mensaje para guardar como plantilla"
      required: ["action", "name"]

    SaveCalendarSettingsArgs:
      description: |
        **save_calendar_settings** [calendar] (mutation)
        Guarda la configuracion global del modulo de calendario
      type: object
      properties:
        action:
          type: string
          description: "Accion fija"
        settings:
          type: object
          description: "Objeto con la configuracion del calendario"
        enabled:
          type: boolean
          description: "Si el modulo de calendario esta habilitado"
      required: ["action"]

    SaveMassMarketingConfigArgs:
      description: |
        **save_mass_marketing_config** [mass_marketing] (mutation)
        Guarda la configuracion de marketing masivo: auto-respuesta, traduccion y opciones de envio
      type: object
      properties:
        auto_reply_enabled:
          type: boolean
          description: "true para activar la auto-respuesta, false para desactivarla"
        auto_reply_text:
          type: string
          description: "Texto de auto-respuesta cuando un destinatario responde a un mensaje masivo"
        auto_reply_translate:
          type: boolean
          description: "Si true, la auto-respuesta se traduce al idioma del destinatario segun su prefijo telefonico"
        auto_reply_unsubscribe:
          type: boolean
          description: "Si true, incluye un enlace de baja en la auto-respuesta"
        custom_unsubscribe_text:
          type: string
          description: "Texto personalizado para el enlace de baja en campanas. Maximo 500 caracteres. Enviar vacio o null para usar el texto predeterminado."
        require_approval:
          type: boolean
          description: "Si true, las campanas creadas por agentes requieren aprobacion del administrador antes de enviarse"

    SavePluginConversationNoteArgs:
      description: |
        **save_plugin_conversation_note** [plugins] (mutation)
        Genera un resumen IA de una conversacion del plugin de chat web y lo guarda como nota en el perfil del cliente. Requiere que el visitante se haya identificado con telefono o email para poder asociarlo a un cliente existente.
      type: object
      properties:
        session_id:
          type: string
          description: "ID de la sesion de chat del plugin"
      required: ["session_id"]

    SavePromptArgs:
      description: |
        **save_prompt** [prompt] (mutation)
        Guarda un nuevo prompt para la IA. FLUJO OBLIGATORIO: 1) Llama a esta accion con el prompt completo. 2) Recibiras requires_confirmation=true con success=false — esto NO es un error, es el flujo normal. 3) Describe brevemente al usuario que cambios se van a guardar y PARA. NO llames de nuevo a esta accion. El sistema mostrara botones de Confirmar/Cancelar automaticamente. NUNCA vuelvas a llamar save_prompt tras recibir requires_confirmation=true, ni siquiera si el usuario escribe 'si', 'yes', 'hazlo', 'confirma', 'dale' o cualquier variante afirmativa en texto. La confirmacion SOLO se completa con los botones del sistema. Si el usuario insiste por texto, respondele: 'Usa el boton de Confirmar que aparecio arriba para completar el guardado.' Si el usuario quiere MODIFICAR el prompt existente (no reemplazarlo), usa apply_prompt_instruction primero.
        ⚠️ Requires confirmation
      type: object
      properties:
        prompt:
          type: string
          description: "El nuevo prompt para la IA. Si el usuario quiere modificar el prompt existente (ej: 'anade horario de 9 a 18h'), usa apply_prompt_instruction en su lugar - esa accion genera el prompt modificado y luego tu llamas a save_prompt con el resultado"
        enable_web_search:
          type: boolean
          description: "Opcionalmente, activar o desactivar la busqueda web al guardar el prompt"
      required: ["prompt"]

    SaveSmartFollowupConfigArgs:
      description: |
        **save_smart_followup_config** [smart_followup] (mutation)
        Actualiza la configuracion de seguimiento inteligente. Solo envia los campos que quieras cambiar. El sistema verifica automaticamente que el contacto no este dado de baja (mass marketing) y no tenga sentimiento negativo antes de enviar.
        ⚠️ Requires confirmation
      type: object
      properties:
        enabled:
          type: boolean
          description: "Enable or disable smart follow-up"
        run_hour:
          type: integer
          description: "Hour to run (0-23) in shop's timezone"
        lookback_hours:
          type: integer
          description: "How many hours back to look for conversations (default 24)"
        min_intent_level:
          type: string
          description: "Minimum intent level to follow up: 'low', 'medium', or 'high'"
        max_attempts:
          type: integer
          description: "Maximum follow-up attempts per conversation (1-5)"
        retry_interval_hours:
          type: integer
          description: "Hours to wait between retry attempts for the same conversation"
        max_conversations:
          type: integer
          description: "Maximum conversations to process per cron run"
        auto_send_enabled:
          type: boolean
          description: "Whether to automatically send WhatsApp follow-up messages"
        archive_after_send:
          type: boolean
          description: "Whether to archive the WhatsApp chat after sending follow-up"
        delay_days:
          type: integer
          description: "Days to wait before sending follow-up (0-7)"
        run_days:
          type: array
          description: "Days of the week to run (0=Sunday, 1=Monday, ..., 6=Saturday). JSON array of integers."
        tracking_days:
          type: integer
          description: "Days to track conversions after follow-up is sent"
        reset_attempts_days:
          type: integer
          description: "Days after which attempt count resets for a conversation"
        custom_instructions:
          type: string
          description: "Instrucciones personalizadas para la IA al generar mensajes de seguimiento"
        followup_tone:
          type: string
          description: "Tono de los mensajes de seguimiento: 'friendly' (amigable), 'professional' (profesional) o 'casual'"
        whatsapp_session_id:
          type: integer
          description: "ID de la sesion de WhatsApp a usar para enviar los mensajes de seguimiento"
        exclude_phones:
          type: array
          description: "Lista de telefonos a excluir del seguimiento (maximo 200). Formato: array de strings con prefijo +"
        sending_window_start:
          type: integer
          description: "Hora de inicio de la ventana de envio (0-23). null para desactivar ventana"
        sending_window_end:
          type: integer
          description: "Hora de fin de la ventana de envio (0-23). null para desactivar ventana"

    SearchConversationsArgs:
      description: |
        **search_conversations** [conversations] (query)
        Busca conversaciones por texto, telefono o rango de fechas. Ejemplo: 'busca conversaciones que mencionen devolucion'
      type: object
      properties:
        action:
          type: string
          description: "Accion fija"
        query:
          type: string
          description: "Texto a buscar en los mensajes de las conversaciones"
        phone:
          type: string
          description: "Numero de telefono del cliente (con o sin +)"
        date_from:
          type: string
          description: "Fecha inicio (YYYY-MM-DD)"
        date_to:
          type: string
          description: "Fecha fin (YYYY-MM-DD)"
        limit:
          type: integer
          description: "Maximo de resultados (default 20, max 50)"
          default: 20
        offset:
          type: integer
          description: "Posicion de inicio para paginacion"
        hours:
          type: integer
          description: "Ultimas N horas"
        conversation_id:
          type: integer
          description: "ID de conversacion especifica"
        last_n:
          type: integer
          description: "Ultimos N mensajes"
        period:
          type: string
          description: "Periodo de tiempo"
          enum: ["today", "yesterday", "last_7_days"]
        agent_id:
          type: integer
          description: "ID del agente"
        message:
          type: string
          description: "Texto del mensaje a enviar o eliminar"
        format:
          type: string
          description: "Formato de respuesta"
      required: ["action"]

    SearchCustomerCommentsArgs:
      description: |
        **search_customer_comments** [customers] (query)
        Busca texto en los comentarios de todos los clientes
      type: object
      properties:
        action:
          type: string
          description: "Accion fija"
        query:
          type: string
          description: "Texto a buscar en los comentarios"
        limit:
          type: integer
          default: 20
        phone:
          type: string
          description: "Telefono del cliente"
        comment:
          type: string
          description: "Texto del comentario"
        agent_name:
          type: string
          description: "Nombre del agente"
        tag_name:
          type: string
          description: "Nombre del tag"
        tag_color:
          type: string
          description: "Color del tag en formato hexadecimal"
        primary_phone:
          type: string
          description: "Telefono principal para merge"
        secondary_phone:
          type: string
          description: "Telefono secundario para merge"
      required: ["action", "query"]

    SearchCustomersArgs:
      description: |
        **search_customers** [customers] (query)
        Busca clientes por nombre, telefono o email en el CRM y en los contactos
      type: object
      properties:
        action:
          type: string
          description: "Accion fija"
        query:
          type: string
          description: "Texto a buscar (nombre, telefono o email)"
        limit:
          type: integer
          default: 20
        phone:
          type: string
          description: "Telefono del cliente"
        comment:
          type: string
          description: "Texto del comentario"
        agent_name:
          type: string
          description: "Nombre del agente"
        tag_name:
          type: string
          description: "Nombre del tag"
        tag_color:
          type: string
          description: "Color del tag en formato hexadecimal"
        primary_phone:
          type: string
          description: "Telefono principal para merge"
        secondary_phone:
          type: string
          description: "Telefono secundario para merge"
      required: ["action", "query"]

    SearchEmailContactsArgs:
      description: |
        **search_email_contacts** [email] (query)
        Busca clientes por nombre o telefono para vincularlos a hilos de email
      type: object
      properties:
        action:
          type: string
          description: "Accion fija"
        query:
          type: string
          description: "Texto de busqueda (nombre o telefono)"
      required: ["action", "query"]

    SearchProductsArgs:
      description: |
        **search_products** [products] (query)
        Busca productos en tu tienda online o en el CRM configurado
      type: object
      properties:
        action:
          type: string
          description: "Accion fija"
        query:
          type: string
          description: "Texto a buscar en el nombre del producto"
        limit:
          type: integer
          default: 10
      required: ["action", "query"]

    SendEmailReplyArgs:
      description: |
        **send_email_reply** [email] (mutation)
        Envia una respuesta a un hilo de email existente o compone un nuevo email
        ⚠️ Requires confirmation
      type: object
      properties:
        thread_id:
          type: integer
          description: "ID del hilo para responder (0 para email nuevo)"
        to:
          type: string
          description: "Destinatario (obligatorio para email nuevo)"
        subject:
          type: string
          description: "Asunto (obligatorio para email nuevo)"
        body_html:
          type: string
          description: "Contenido HTML del email"
        scheduled_at:
          type: string
          description: "Fecha y hora para programar el envio (ISO 8601)"
        attachment_ids:
          type: array
          description: "IDs de adjuntos previamente subidos"
        cc:
          type: array
          description: "Direcciones CC"
        bcc:
          type: array
          description: "Direcciones BCC"
        account_id:
          type: integer
          description: "ID de la cuenta de correo"
      required: ["body_html"]

    SendSupportTicketArgs:
      description: |
        **send_support_ticket** [support] (mutation)
        Envia un mensaje al equipo de soporte de WAzion. Usa esta accion cuando el usuario tenga un problema que no puedas resolver, quiera reportar un bug, o necesite ayuda del equipo tecnico.
      type: object
      properties:
        type:
          type: string
          description: "Tipo de solicitud: bug (problema tecnico), question (consulta general), feature (sugerencia de mejora), billing (facturacion), other (otro)"
          enum: ["bug", "question", "feature", "billing", "other"]
        subject:
          type: string
          description: "Asunto breve del mensaje (max 100 caracteres)"
        message:
          type: string
          description: "Descripcion detallada del problema o consulta (max 2000 caracteres)"
      required: ["type", "subject", "message"]

    SendWhatsappMessageArgs:
      description: |
        **send_whatsapp_message** [whatsapp_ops] (mutation)
        Envia un mensaje de WhatsApp a un telefono. El numero debe incluir prefijo internacional formato E.164 (ej: +34612345678). Si el usuario da un numero sin prefijo, preguntale el pais antes de enviar. IMPORTANTE: Esta accion requiere confirmacion. Cuando la llames, recibiras requires_confirmation=true y success=false - esto es NORMAL, NO es un error. Simplemente describe al usuario lo que se va a enviar y PARA. El sistema mostrara botones de confirmar/cancelar automaticamente. NO reintentes la accion.
        ⚠️ Requires confirmation
      type: object
      properties:
        action:
          type: string
        phone:
          type: string
          description: "Telefono destino en formato E.164 con prefijo internacional (ej: +34612345678). Si el usuario no incluye prefijo, preguntarle el pais. OBLIGATORIO"
        message:
          type: string
          description: "Texto del mensaje a enviar. OBLIGATORIO - no enviar vacio"
        session_id:
          type: integer
          description: "ID de sesion especifica (opcional, usa la primera conectada)"
        archive_after_send:
          type: boolean
          description: "Archivar chat tras enviar"
      required: ["action", "phone", "message"]

    SetAiErrorArgs:
      description: |
        **set_ai_error** [knowledge] (mutation)
        Record a mistake in YOUR OWN responses or behavior (this dashboard chat). Call this when the user corrects you, AND when you proactively detect you did something wrong. This includes: wrong answers and behavioral rules about HOW you should act. IMPORTANT: This is for YOUR errors. For errors in the CONTENT of responses sent to customers by the WhatsApp AI, use set_customer_ai_error instead.
      type: object
      properties:
        fact_content:
          type: string
          description: "The correct information or rule to remember"
        category:
          type: string
          description: "Category: shipping, pricing, warranty, product, tone, policy, communication, general"
        original_text:
          type: string
          description: "What the AI originally said wrong"
      required: ["fact_content", "category"]

    SetCustomerAiErrorArgs:
      description: |
        **set_customer_ai_error** [knowledge] (mutation)
        Record a correction for the CUSTOMER-FACING WhatsApp AI (auto-pilot, workflows, suggestions, chat web plugin). Use ONLY when the CONTENT of a response sent to a customer was wrong (wrong info, wrong tone, unnecessary questions to the customer). Do NOT use this for behavioral rules about when/whether to respond — those belong in set_ai_error. IMPORTANT: If the user says the AI should not have replied or should have handled the situation differently, that is a behavioral rule for set_ai_error, not a content correction.
      type: object
      properties:
        fact_content:
          type: string
          description: "The correct information that the AI should use instead"
        category:
          type: string
          description: "Category: shipping, pricing, warranty, product, tone, policy, communication, general"
        original_text:
          type: string
          description: "The wrong text that the AI generated"
      required: ["fact_content", "category"]

    SetEmailPriorityArgs:
      description: |
        **set_email_priority** [email] (mutation)
        Cambia la prioridad de un hilo de email.
      type: object
      properties:
        action:
          type: string
          description: "Debe ser 'set_priority'"
        thread_id:
          type: integer
          description: "ID del hilo"
        priority:
          type: string
          description: "Prioridad del hilo"
          enum: ["high", "medium", "low"]
      required: ["action", "thread_id", "priority"]

    SetEmailTagsArgs:
      description: |
        **set_email_tags** [email] (mutation)
        Establece las etiquetas de un hilo de email. Las etiquetas son strings libres.
      type: object
      properties:
        action:
          type: string
          description: "Debe ser 'set_tags'"
        thread_id:
          type: integer
          description: "ID del hilo"
        tags:
          type: array
          description: "Array de etiquetas (strings). Enviar array vacio para quitar todas."
      required: ["action", "thread_id", "tags"]

    SmartKnowledgeUpdateArgs:
      description: |
        **smart_knowledge_update** [prompt] (mutation)
        Busca y actualiza datos aprendidos que contradigan o estén desactualizados según la instrucción del usuario. Usa esto cuando el usuario dice cosas como 'ahora aceptamos PayPal', 'hemos cambiado el horario', 'ya no hacemos envíos a X', etc. Primero llama SIN confirm para ver preview, luego con confirm=true y selected_ids para ejecutar.
        ⚠️ Requires confirmation
      type: object
      properties:
        instruction:
          type: string
          description: "Instrucción en lenguaje natural describiendo el cambio en el negocio"
        confirm:
          type: boolean
          description: "true para ejecutar los cambios (segunda llamada)"
        selected_ids:
          type: array
          description: "IDs de snippets a modificar (solo con confirm=true). Si no se pasa, se aplican todos los cambios propuestos"
        changes:
          type: array
          description: "Lista de cambios propuestos del preview (para Phase 2 con confirm=true). Cada elemento: {id, action, proposed}"
      required: ["instruction"]

    SnoozeEmailThreadArgs:
      description: |
        **snooze_email_thread** [email] (mutation)
        Pospone un hilo de email hasta una fecha y hora especifica. El hilo se reabrira automaticamente cuando llegue el momento.
      type: object
      properties:
        action:
          type: string
          description: "Debe ser 'snooze'"
        thread_id:
          type: integer
          description: "ID del hilo"
        until:
          type: string
          description: "Fecha y hora hasta cuando posponer (formato ISO 8601, ej: 2026-03-25T09:00:00)"
      required: ["action", "thread_id", "until"]

    StartCampaignArgs:
      description: |
        **start_campaign** [mass_marketing] (mutation)
        Inicia el envio de una campana de marketing masivo. Funciona con campanas en estado borrador o programadas.
        ⚠️ Requires confirmation
      type: object
      properties:
        action:
          type: string
          description: "Accion fija: start"
        campaign_id:
          type: integer
          description: "ID de la campana a iniciar"
      required: ["action", "campaign_id"]

    SyncKnowledgeNowArgs:
      description: |
        **sync_knowledge_now** [storage] (mutation)
        Fuerza la sincronizacion inmediata de los facts aprendidos al Vector Store (normalmente se hace automaticamente)
      type: object

    TestCrmEndpointArgs:
      description: |
        **test_crm_endpoint** [advanced] (query)
        Prueba la conectividad y respuesta de un endpoint CRM personalizado configurado en la tienda
      type: object
      properties:
        type:
          type: string
          description: "Tipo de endpoint: sidePanel_CustomerInfo, ai_CustomerInitialInfo, sidePanel_CustomerFindToJoin, search_Products, globalSearch"
        url:
          type: string
          description: "URL del endpoint a probar"
        method:
          type: string
          description: "Metodo HTTP (GET o POST, default GET)"
        auth:
          type: object
          description: "Configuracion de autenticacion con type (header, basic, body, query) y campos"
        test_phone:
          type: string
          description: "Telefono de prueba (default +34600000000)"
      required: ["type", "url"]

    TestEcommerceConnectionArgs:
      description: |
        **test_ecommerce_connection** [integrations] (query)
        Verifica que la conexion con la plataforma e-commerce (Shopify, WooCommerce, PrestaShop o VTEX) funciona correctamente. Usa las credenciales guardadas si no se proporcionan.
      type: object

    TestEmailConnectionArgs:
      description: |
        **test_email_connection** [email] (query)
        Verifica que la conexion IMAP y SMTP de una cuenta de email funciona correctamente.
      type: object
      properties:
        account_id:
          type: integer
          description: "ID de la cuenta a probar"
        imap_host:
          type: string
          description: "Servidor IMAP"
        imap_port:
          type: string
          description: "Puerto IMAP"
        imap_user:
          type: string
          description: "Usuario IMAP"
        imap_password:
          type: string
          description: "Contrasena IMAP"
        smtp_host:
          type: string
          description: "Servidor SMTP"
        smtp_port:
          type: string
          description: "Puerto SMTP"
        smtp_user:
          type: string
          description: "Usuario SMTP"
        smtp_password:
          type: string
          description: "Contrasena SMTP"
        email_address:
          type: string
          description: "Direccion de email"
      required: ["account_id", "imap_host", "imap_port", "imap_user", "imap_password", "smtp_host", "smtp_port", "smtp_user", "smtp_password", "email_address"]

    TestShopifyConnectionArgs:
      description: |
        **test_shopify_connection** [integrations] (query)
        Valida la conexion con una tienda Shopify verificando las credenciales y los permisos OAuth. Si no se proporcionan credenciales, usa las almacenadas en la configuracion de la tienda.
      type: object
      properties:
        shopify_url:
          type: string
          description: "URL de la tienda Shopify (ej: mitienda.myshopify.com). Si no se proporciona, usa las credenciales guardadas"
        shopify_token:
          type: string
          description: "Token de acceso Shopify. Si no se proporciona, usa el token guardado"
        url:
