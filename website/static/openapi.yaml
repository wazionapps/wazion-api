    UpdateEmailAgentsArgs:
      description: |
        **update_email_agents** [email] (mutation)
        Actualiza los agentes asignados a una cuenta de correo electronico.
      type: object
      properties:
        action:
          type: string
          description: "Accion fija"
        id:
          type: integer
          description: "ID de la cuenta de email"
        agent_hashes:
          type: array
          description: "Lista de phone_hash de agentes a asignar. Array vacio para quitar todos"
      required: ["action", "id"]

    UpdateEmailAutoresponderArgs:
      description: |
        **update_email_autoresponder** [email] (mutation)
        Configura el auto-responder IA para una cuenta de email. Puede generar borradores o enviar respuestas automaticas.
      type: object
      properties:
        action:
          type: string
          description: "Accion fija"
        id:
          type: integer
          description: "ID de la cuenta de email"
        auto_responder_enabled:
          type: boolean
          description: "Activar o desactivar el auto-responder"
        auto_responder_mode:
          type: string
          description: "Modo: 'draft' (genera borrador para revision) o 'automatic' (envia automaticamente)"
        auto_responder_schedule:
          type: string
          description: "Horario: 'always' (siempre) o 'outside_hours' (solo fuera de horario)"
        auto_responder_thread_limit:
          type: integer
          description: "Maximo de respuestas automaticas por hilo (1-10). Default: 2"
        auto_responder_daily_limit:
          type: integer
          description: "Limite diario de auto-respuestas"
      required: ["action", "id"]

    UpdateEmailFoldersArgs:
      description: |
        **update_email_folders** [email] (mutation)
        Configura el mapeo de carpetas IMAP para una cuenta de email (Enviados, Papelera, Archivo, Spam). Necesario para la sincronizacion bidireccional.
      type: object
      properties:
        action:
          type: string
          description: "Debe ser 'update_folders'"
        id:
          type: integer
          description: "ID de la cuenta de email"
        sent_folder:
          type: string
          description: "Nombre de la carpeta de enviados"
        trash_folder:
          type: string
          description: "Nombre de la carpeta de papelera"
        archive_folder:
          type: string
          description: "Nombre de la carpeta de archivo"
        spam_folder:
          type: string
          description: "Nombre de la carpeta de spam"
      required: ["action", "id"]

    UpdateEmailRetentionArgs:
      description: |
        **update_email_retention** [email] (mutation)
        Cambia el periodo de retencion de emails. Los emails mas antiguos se eliminan automaticamente.
      type: object
      properties:
        action:
          type: string
          description: "Accion fija"
        retention_days:
          type: integer
          description: "Dias de retencion: 30, 60, 90 o 180"
          enum: [30, 60, 90, 180]
        id:
          type: integer
          description: "ID de la cuenta de correo"
      required: ["action", "retention_days", "id"]

    UpdateEmailRuleArgs:
      description: |
        **update_email_rule** [email] (mutation)
        Actualiza una regla de email existente. Puede modificar nombre, prioridad, estado, condiciones o acciones.
      type: object
      properties:
        action:
          type: string
          description: "Debe ser 'update'"
        id:
          type: integer
          description: "ID de la regla a actualizar"
        name:
          type: string
          description: "Nuevo nombre"
        priority:
          type: integer
          description: "Nueva prioridad"
        is_active:
          type: integer
          description: "1=activa, 0=desactivada"
        conditions:
          type: array
          description: "Nuevas condiciones (reemplaza las actuales)"
        actions:
          type: array
          description: "Nuevas acciones (reemplaza las actuales)"
      required: ["action", "id"]

    UpdateEmailSyncArgs:
      description: |
        **update_email_sync** [email] (mutation)
        Configura el modo de sincronizacion IMAP para una cuenta: solo bandeja de entrada o bidireccional (sincroniza acciones como archivar, eliminar, spam con el servidor).
      type: object
      properties:
        action:
          type: string
          description: "Debe ser 'update_sync'"
        id:
          type: integer
          description: "ID de la cuenta de email"
        sync_mode:
          type: string
          description: "Modo de sincronizacion: inbox_only o bidirectional"
      required: ["action", "id"]

    UpdateKnowledgeFileArgs:
      description: |
        **update_knowledge_file** [storage] (mutation)
        Cambia el titulo, descripcion y/o contenido de un archivo de conocimiento. Para archivos de texto (txt, md, csv, json, html) tambien permite editar el contenido del archivo.
      type: object
      properties:
        file_id:
          type: integer
          description: "ID del archivo"
        title:
          type: string
          description: "Nuevo titulo (max 200 caracteres)"
        description:
          type: string
          description: "Nueva descripcion (max 500 caracteres)"
        content:
          type: string
          description: "Nuevo contenido del archivo (solo para archivos de texto: txt, md, csv, json, html). Si se envia, el archivo se reemplaza en OpenAI y se re-indexa en el Vector Store. No enviar este parametro si solo se quiere cambiar titulo/descripcion."
      required: ["file_id", "title"]

    UpdateKnowledgeSnippetArgs:
      description: |
        **update_knowledge_snippet** [prompt] (mutation)
        Permite aprobar, rechazar, editar o eliminar un dato aprendido. Usa filter=pending en list_knowledge_snippets para ver los pendientes de revision. IMPORTANTE: Esta accion requiere confirmacion - ver seccion confirmation_flow.
        ⚠️ Requires confirmation
      type: object
      properties:
        id:
          type: integer
          description: "ID del snippet a gestionar"
        action:
          type: string
          description: "Accion a realizar: approve, reject, edit, delete, resolve_conflict, keep_both, toggle_permanent"
          enum: ["approve", "reject", "edit", "delete", "resolve_conflict", "keep_both", "toggle_permanent"]
        content:
          type: string
          description: "Nuevo contenido (solo para action=edit)"
        category:
          type: string
          description: "Nueva categoria (solo para action=edit)"
        keep_id:
          type: integer
          description: "ID del snippet a mantener (solo para action=resolve_conflict)"
      required: ["id", "action"]

    UpdateLanguageArgs:
      description: |
        **update_language** [general] (mutation)
        Cambia el idioma del dashboard y las respuestas de la IA
      type: object
      properties:
        language:
          type: string
          description: "Codigo del idioma (es=Espanol, en=Ingles, de=Aleman, fr=Frances, pt=Portugues, hu=Hungaro, it=Italiano)"
          enum: ["es", "en", "de", "fr", "pt", "hu", "it"]
      required: ["language"]

    UpdateOrderSettingsArgs:
      description: |
        **update_order_settings** [general] (mutation)
        Configura prefijos de pedidos y telefonos/emails a ignorar
      type: object
      properties:
        order_prefix:
          type: string
          description: "Prefijo para numeros de pedido (ej: #, PED-)"
          default: "#"
        order_suffix:
          type: string
          description: "Sufijo para numeros de pedido"
        add_ignore_phone:
          type: string
          description: "Telefono a ANADIR sin borrar los existentes. USAR SIEMPRE ESTE para anadir telefonos."
        remove_ignore_phone:
          type: string
          description: "Telefono a eliminar de la lista de ignorados"
        add_ignore_email:
          type: string
          description: "Email a ANADIR sin borrar los existentes. USAR SIEMPRE ESTE para anadir emails."
        remove_ignore_email:
          type: string
          description: "Email a eliminar de la lista de ignorados"
        add_helper:
          type: string
          description: "JSON para crear o actualizar un atajo. Formato: {"name": "NOMBRE_CORTO", "text": "TEXTO_DEL_ATAJO", "send": true/false}. El campo 'send' activa el envio automatico (el atajo se envia al cliente sin que el agente pulse enviar). Si no se incluye 'send', se desactiva por defecto. Ejemplo con envio automatico: {"name": "compra VIN ok", "text": "la compra esta correcta para dicho numero de bastidor", "send": true}. Si ya existe un atajo con el mismo nombre, se actualiza (util para activar/desactivar envio automatico sin recrear el atajo)."
        remove_helper:
          type: string
          description: "Nombre corto del atajo a eliminar (ej: bastidor)"

    UpdateScheduledMessageArgs:
      description: |
        **update_scheduled_message** [whatsapp_ops] (mutation)
        Updates a pending scheduled WhatsApp message. Can modify the text, datetime, and/or sending session. Only pending messages can be edited.
        ⚠️ Requires confirmation
      type: object
      properties:
        action:
          type: string
        id:
          type: integer
          description: "ID of the scheduled message to update"
        message_text:
          type: string
          description: "New message text"
        scheduled_at:
          type: string
          description: "New date and time in format YYYY-MM-DD HH:MM (shop timezone)"
        session_id:
          type: integer
          description: "New WhatsApp Auto session ID to send from"
        agent_id:
          type: integer
          description: "ID del agente que modifica el mensaje"
      required: ["action", "id"]

    UpdateStoreUrlArgs:
      description: |
        **update_store_url** [general] (mutation)
        Actualiza la URL de tu tienda online
      type: object
      properties:
        url_tienda:
          type: string
          description: "URL completa de la tienda (ej: https://mitienda.com)"
      required: ["url_tienda"]

    UpdateTaskArgs:
      description: |
        **update_task** [tasks] (mutation)
        Modifica una tarea existente: cambiar estado, texto, prioridad, fecha limite o asignacion
      type: object
      properties:
        action:
          type: string
          description: "Accion fija"
        task_id:
          type: integer
          description: "ID de la tarea a actualizar"
        task_text:
          type: string
          description: "Nuevo texto de la tarea"
        status:
          type: string
          description: "Nuevo estado"
          enum: ["pending", "in_progress", "completed", "cancelled"]
        due_date:
          type: string
          description: "Nueva fecha limite (YYYY-MM-DD)"
        priority:
          type: string
          enum: ["low", "medium", "high"]
        assigned_agent_id:
          type: integer
          description: "Nuevo agente asignado"
        agent_id:
          type: integer
          description: "ID del agente"
        phone:
          type: string
          description: "Telefono del cliente"
        limit:
          type: integer
          description: "Maximo de resultados"
        offset:
          type: integer
          description: "Posicion de inicio para paginacion"
        include_completed:
          type: boolean
          description: "Incluir tareas completadas"
      required: ["action", "task_id"]

    UpdateTimezoneArgs:
      description: |
        **update_timezone** [general] (mutation)
        Cambia la zona horaria para mostrar fechas y horas correctamente
      type: object
      properties:
        timezone_pref:
          type: string
          description: "Zona horaria en formato IANA (ej: Europe/Madrid, America/Mexico_City)"
      required: ["timezone_pref"]

    UpdateWhatsappProfileArgs:
      description: |
        **update_whatsapp_profile** [whatsapp_ops] (mutation)
        Actualiza campos del perfil de WhatsApp: info/about, y datos de empresa (descripcion, direccion, email, web, horario). El nombre solo se puede cambiar en cuentas personales (no Business). Opcionalmente aplica los cambios a otras sesiones conectadas.
      type: object
      properties:
        session_id:
          type: integer
          description: "ID de la sesion WhatsApp"
        name:
          type: string
          description: "Nuevo nombre (min 3 chars, solo cuentas personales, NO funciona en Business)"
        status:
          type: string
          description: "Nuevo texto de info/about (max 139 chars)"
        description:
          type: string
          description: "Descripcion de empresa (solo Business)"
        address:
          type: string
          description: "Direccion de empresa (solo Business)"
        email:
          type: string
          description: "Email de empresa (solo Business)"
        websites:
          type: array
          description: "URLs de la empresa (solo Business)"
        apply_to_sessions:
          type: array
          description: "IDs de otras sesiones conectadas a las que aplicar los mismos cambios"
      required: ["session_id"]

    UpdateWhatsappSessionArgs:
      description: |
        **update_whatsapp_session** [automation] (mutation)
        Actualiza la etiqueta (nombre) de una sesion de WhatsApp conectada. Util para identificar numeros (ej: 'Soporte', 'Ventas').
      type: object
      properties:
        session_id:
          type: integer
          description: "ID de la sesion a editar. Usa get_whatsapp_status para obtener los IDs."
        label:
          type: string
          description: "Etiqueta para identificar la sesion (max 50 caracteres). Null para quitar la etiqueta."
      required: ["session_id"]

    UpdateWhatsappWorkflowArgs:
      description: |
        **update_whatsapp_workflow** [automation] (mutation)
        Modifica un workflow existente (cambiar condiciones, añadir/quitar palabras clave, editar acciones, renombrar, activar/desactivar). Soporta update parcial: solo se sobreescriben los campos que se envian, los demas se mantienen sin cambios. IMPORTANTE: el parametro 'id' es OBLIGATORIO y debe ser el ID numerico del workflow (obtenido de list_whatsapp_workflows). Si el usuario dice 'ajustalo', 'yes apply', 'hazlo' u otra respuesta de seguimiento, DEBES recordar el workflow_id del contexto previo de la conversacion y enviarlo. NUNCA enviar esta accion sin 'id'. Para cambiar solo el mensaje de una accion: SIEMPRE leer primero con list_whatsapp_workflows, copiar el array de actions completo preservando TODOS los valores originales (especialmente delay seconds), y enviar el array modificado. Si solo cambias name, conditions o status, NO envies 'actions' — se preservan automaticamente.
      type: object
      properties:
        id:
          type: integer
          description: "ID numerico del workflow a editar. OBLIGATORIO siempre. Obtenerlo de list_whatsapp_workflows. Sin este parametro la peticion se trata como creacion y fallara si falta el nombre."
        name:
          type: string
          description: "Nombre del workflow (max 100 caracteres). Si no se envia, se mantiene el nombre actual"
        trigger_type:
          type: string
          description: "Tipo de trigger: 'message.received' o 'message.sent'. Si no se envia, se mantiene el valor actual"
          enum: ["message.received", "message.sent"]
          default: "message.received"
        conditions:
          type: object
          description: "Objeto con 'logic' (AND/OR) y 'rules' (array de condiciones). Si no se envia, se mantienen las condiciones actuales"
        actions:
          type: array
          description: "Array de acciones a ejecutar. Si no se envia, se mantienen las acciones actuales. IMPORTANTE: si envias este campo, debes enviar el array COMPLETO de acciones (no solo la que cambias). Para editar solo el mensaje de una accion reply/reply_with_ai: 1) llama list_whatsapp_workflows para obtener las acciones actuales, 2) modifica solo el campo que necesitas, 3) envia el array completo con todos los valores existentes preservados. Tipos soportados: reply_with_ai (con pre_send_check opcional), reply (con no_repeat opcional), delay (seconds: 1-300, OBLIGATORIO), ai_filter (filtro IA que decide si responder, previene bucles, ideal como primera accion). Para ai_filter se puede añadir prompt:'instrucciones' para personalizar criterios. VALIDACION: cada accion delay DEBE tener 'seconds' entre 1 y 300. Si copias un delay existente, manten su valor original de seconds."
        session_id:
          type: integer
          description: "ID de la sesion de WhatsApp a la que asignar este workflow. null = todos los numeros. Usa get_whatsapp_status para ver las sesiones."
        status:
          type: string
          description: "Estado del workflow: 'enabled' para activar, 'disabled' para desactivar"
          enum: ["enabled", "disabled"]
      required: ["id"]

    UploadEmailAttachmentArgs:
      description: |
        **upload_email_attachment** [email] (mutation)
        Sube un archivo para adjuntarlo a un email
      type: object
      properties:
        action:
          type: string
          description: "Accion fija"
        file_data:
          type: string
          description: "Contenido del archivo en base64"
        file_name:
          type: string
          description: "Nombre del archivo"
        file_mime:
          type: string
          description: "Tipo MIME del archivo"
        file_size:
          type: integer
          description: "Tamano del archivo en bytes"
      required: ["action", "file_data", "file_name", "file_mime", "file_size"]

    VerifyEcommerceWritePermissionArgs:
      description: |
        **verify_ecommerce_write_permission** [integrations] (query)
        Verifica si la conexion con la plataforma e-commerce tiene permisos de escritura para sincronizar FAQs. Requiere plataforma conectada Y plugin Product Q&A configurado.
      type: object
