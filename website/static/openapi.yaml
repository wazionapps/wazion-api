    DeleteWhatsappTemplateArgs:
      description: |
        **delete_whatsapp_template** [whatsapp_ops] (mutation)
        Elimina una plantilla de mensaje de WhatsApp. FLUJO DE CONFIRMACION: Esta accion devolvera requires_confirmation=true con success=false - esto NO es un error, es el flujo normal. Cuando recibas esto, describe brevemente al usuario que la plantilla se eliminara y PARA. NO llames de nuevo a esta accion. El sistema mostrara botones de Confirmar/Cancelar automaticamente.
        ⚠️ Requires confirmation
