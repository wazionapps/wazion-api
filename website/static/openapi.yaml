      type: object
      properties:
        thread_id:
          type: integer
          description: "ID del hilo"
      required: ["thread_id"]

    ListEmailRulesArgs:
      description: |
        **list_email_rules** [email] (query)
        Lista todas las reglas automaticas de email configuradas para la tienda. Las reglas se aplican a los emails entrantes en orden de prioridad.
      type: object

    ListEmailThreadsArgs:
      description: |
        **list_email_threads** [email] (query)
        Lista los hilos de email de la tienda, con filtros por estado y cuenta
      type: object
      properties:
        filter:
          type: string
          description: "Filtro: unread, read, all (default: all)"
        account_id:
          type: integer
          description: "ID de cuenta para filtrar"
        search:
          type: string
          description: "Buscar por asunto o remitente"
        page:
          type: integer
          description: "Pagina (default: 1)"
        limit:
          type: integer
          description: "Resultados por pagina (default: 20)"
        from_filter:
          type: string
          description: "Filtrar por remitente"
        has_attachments:
          type: string
          description: "Filtrar por hilos con adjuntos"
        tag:
          type: string
          description: "Filtrar por etiqueta"
        assigned:
          type: string
          description: "Filtrar por agente asignado"
        date_from:
          type: string
          description: "Fecha inicio del filtro"
        date_to:
          type: string
          description: "Fecha fin del filtro"

    ListKnowledgeFilesArgs:
      description: |
        **list_knowledge_files** [storage] (query)
        Muestra todos los archivos subidos a la base de conocimiento (PDFs, documentos, etc.)
      type: object

    ListKnowledgeSnippetsArgs:
      description: |
        **list_knowledge_snippets** [knowledge] (query)
        Lista snippets de conocimiento filtrados por estado (pendiente, activo, en conflicto, obsoleto, rechazado)
      type: object
      properties:
        filter:
          type: string
          description: "Filtro por estado: pending, active, conflicts, stale, rejected"
        category:
          type: string
          description: "Filtrar por categoria"
        search:
          type: string
          description: "Buscar en contenido de snippets"
        source_type:
          type: string
          description: "Filtrar por tipo de fuente"
        offset:
          type: integer
          description: "Offset para paginacion"
        limit:
          type: integer
          description: "Limite de resultados"
        risk_level:
          type: string
          description: "Filtrar por nivel de riesgo"

    ListNotificationsArgs:
      description: |
        **list_notifications** [notifications] (query)
        Obtiene las notificaciones del sistema con filtros opcionales
      type: object
      properties:
        action:
          type: string
          description: "Accion fija"
        filter:
          type: string
          description: "Filtro: all (default), unread, read"
        type:
          type: string
          description: "Filtrar por tipo de notificacion"
        limit:
          type: integer
          description: "Maximo de resultados (default 20, max 100)"
        offset:
          type: integer
          description: "Paginacion"
        notification_id:
          type: integer
          description: "ID de la notificacion"
        agent_id:
          type: integer
          description: "ID del agente"
      required: ["action"]

    ListOauthCalendarsArgs:
      description: |
        **list_oauth_calendars** [calendar] (query)
        Lista los calendarios disponibles de una conexion OAuth (Google/Microsoft) para vincular
      type: object
      properties:
        action:
          type: string
          description: "Accion fija"
        connection_id:
          type: integer
          description: "ID de la conexion OAuth"
      required: ["action", "connection_id"]

    ListPluginConfigsArgs:
      description: |
        **list_plugin_configs** [plugins] (query)
        Lista todos los plugins instalados con su configuracion y estado
      type: object
      properties:
        action:
          type: string
        plugin_type:
          type: string
          description: "Filtrar por tipo de plugin"
        hours:
          type: integer
          description: "Ultimas N horas a analizar"
        limit:
          type: integer
          description: "Maximo de resultados"
        period:
          type: string
          description: "Periodo de tiempo para las estadisticas"
          enum: ["today", "yesterday", "last_7_days", "last_30_days"]
      required: ["action"]

    ListScheduledEmailsArgs:
      description: |
        **list_scheduled_emails** [email] (query)
        Muestra los emails que estan programados para enviarse en el futuro.
      type: object
      properties:
        filter:
          type: string
          description: "Debe ser 'scheduled'"
        from_filter:
          type: string
          description: "Filtrar por remitente"
        has_attachments:
          type: string
          description: "Filtrar por emails con adjuntos"
        tag:
          type: string
          description: "Filtrar por etiqueta"
        assigned:
          type: string
          description: "Filtrar por agente asignado"
        date_from:
          type: string
          description: "Fecha inicio del filtro"
        date_to:
          type: string
          description: "Fecha fin del filtro"
      required: ["filter"]

    ListScheduledMessagesArgs:
      description: |
        **list_scheduled_messages** [whatsapp_ops] (query)
        Lists scheduled WhatsApp messages with optional status filter. Returns id, session info, phone, message text, scheduled time, status, agent name, and sent/error info.
      type: object
      properties:
        action:
          type: string
          description: "Accion fija"
        status:
          type: string
          description: "Filtrar por estado (default: pending, all para ver todos)"
          enum: ["pending", "sent", "cancelled", "failed", "all"]
          default: "pending"
        page:
          type: integer
          description: "Pagina de resultados"
        period:
          type: string
          description: "Periodo de tiempo para filtrar: today (hoy), 7/30/90 (ultimos N dias), custom (requiere date_from y date_to)"
          enum: ["today", "7", "30", "90", "custom"]
        date_from:
          type: string
          description: "Fecha inicio YYYY-MM-DD"
        date_to:
          type: string
          description: "Fecha fin YYYY-MM-DD"
        phone:
          type: string
          description: "Filtrar por número de teléfono del destinatario"
      required: ["action"]

    ListStorageFilesArgs:
      description: |
        **list_storage_files** [storage] (query)
        Muestra la lista de archivos subidos a la base de conocimiento con su tamano y fecha
      type: object
      properties:
        limit:
          type: integer
          description: "Numero maximo de archivos a mostrar (1-50)"
          default: 20

    ListTasksArgs:
      description: |
        **list_tasks** [tasks] (query)
        Lista las tareas de la tienda con filtros opcionales por estado, agente o telefono
      type: object
      properties:
        action:
          type: string
          description: "Accion fija"
        status:
          type: string
          description: "Filtrar por estado"
          enum: ["pending", "in_progress", "completed", "cancelled"]
        agent_id:
          type: integer
          description: "Filtrar por agente asignado"
        phone:
          type: string
          description: "Filtrar por telefono del cliente"
        limit:
          type: integer
          default: 20
        offset:
          type: integer
          description: "Posicion de inicio para paginacion"
        task_text:
          type: string
          description: "Texto de la tarea"
        due_date:
          type: string
          description: "Fecha limite YYYY-MM-DD"
        priority:
          type: string
          description: "Prioridad de la tarea"
          enum: ["low", "medium", "high"]
        assigned_agent_id:
          type: integer
          description: "ID del agente asignado"
        task_id:
          type: integer
          description: "ID de la tarea"
        include_completed:
          type: boolean
          description: "Incluir tareas completadas"
      required: ["action"]

    ListWhatsappAgentsArgs:
      description: |
        **list_whatsapp_agents** [agents] (query)
        Muestra todos los agentes disponibles para asignar en workflows de WhatsApp
      type: object

    ListWhatsappOptoutArgs:
      description: |
        **list_whatsapp_optout** [whatsapp_ops] (query)
        Muestra los contactos que han solicitado no recibir mensajes automaticos de WhatsApp
      type: object
      properties:
        action:
          type: string
          description: "Accion fija"
        page:
          type: integer
          description: "Pagina de resultados (default 1)"
        search:
          type: string
          description: "Filtrar por numero de telefono"
      required: ["action"]

    ListWhatsappScheduledSessionsArgs:
      description: |
        **list_whatsapp_scheduled_sessions** [whatsapp_ops] (query)
        Devuelve las sesiones de WhatsApp conectadas disponibles para enviar mensajes programados.
      type: object
      properties:
        action:
          type: string
          description: "Acción fija"
      required: ["action"]

    ListWhatsappTemplatesArgs:
      description: |
        **list_whatsapp_templates** [whatsapp_ops] (query)
        Muestra las plantillas de mensajes guardadas para WhatsApp
      type: object
      properties:
        action:
          type: string
          description: "Accion fija"
        category:
          type: string
          description: "Filtrar por categoria de plantilla"
      required: ["action"]

    ListWhatsappWorkflowsArgs:
      description: |
        **list_whatsapp_workflows** [automation] (query)
        Obtiene la lista de todos los workflows de automatizacion de WhatsApp. OBLIGATORIO llamar esta accion ANTES de cualquier operacion de eliminacion (delete_whatsapp_workflow, bulk_delete_workflows) para identificar workflows por nombre e ID y confirmar con el usuario cuales quiere eliminar. Tambien usar antes de 'unir' o 'combinar' workflows para entender la configuracion actual.
      type: object

    ManageFaqArgs:
      description: |
        **manage_faq** [plugins] (mutation)
        Permite despublicar, republicar o eliminar FAQs del plugin Product Q&A. Util para gestionar contenido que ya no es relevante.
        ⚠️ Requires confirmation
      type: object
      properties:
        faq_ids:
          type: array
          description: "Array de IDs de FAQs a gestionar (obtener de get_product_qa_faqs)"
        action:
          type: string
          description: "Accion a realizar: unpublish, republish, delete"
          enum: ["unpublish", "republish", "delete"]
      required: ["faq_ids", "action"]

    MarkAllNotificationsReadArgs:
      description: |
        **mark_all_notifications_read** [notifications] (mutation)
        Marca todas las notificaciones no leidas como leidas
      type: object
      properties:
        action:
          type: string
          description: "Accion fija"
        agent_id:
          type: integer
          description: "ID del agente (opcional)"
        limit:
          type: integer
          description: "Maximo de resultados"
        offset:
          type: integer
          description: "Posicion de inicio"
        filter:
          type: string
          description: "Filtro de notificaciones"
        type:
          type: string
          description: "Tipo de notificacion"
        notification_id:
          type: integer
          description: "ID de la notificacion"
      required: ["action"]

    MarkEmailReadArgs:
      description: |
        **mark_email_read** [email] (mutation)
        Marca un hilo de email como leido
      type: object
      properties:
        thread_id:
          type: integer
          description: "ID del hilo"
      required: ["thread_id"]

    MarkNotificationReadArgs:
      description: |
        **mark_notification_read** [notifications] (mutation)
        Marca una notificacion especifica como leida
      type: object
      properties:
        action:
          type: string
          description: "Accion fija"
        notification_id:
          type: integer
          description: "ID de la notificacion"
        agent_id:
          type: integer
          description: "ID del agente que lee (opcional)"
        limit:
          type: integer
          description: "Maximo de resultados"
        offset:
          type: integer
          description: "Posicion de inicio"
        filter:
          type: string
          description: "Filtro de notificaciones"
        type:
          type: string
          description: "Tipo de notificacion"
      required: ["action", "notification_id"]

    MergeCustomersArgs:
      description: |
        **merge_customers** [customers] (mutation)
        Fusiona dos registros de cliente en uno, combinando comentarios, tags y datos CRM
        ⚠️ Requires confirmation
      type: object
      properties:
        action:
          type: string
        primary_phone:
          type: string
          description: "Telefono del cliente principal (se mantiene)"
        secondary_phone:
          type: string
          description: "Telefono del cliente secundario (se fusiona y elimina)"
      required: ["action", "primary_phone", "secondary_phone"]

    MergeEmailThreadsArgs:
      description: |
        **merge_email_threads** [email] (mutation)
        Fusiona un hilo de email en otro. Los mensajes y notas del hilo origen se mueven al destino. Solo se pueden fusionar hilos de la misma cuenta de email.
        ⚠️ Requires confirmation
      type: object
      properties:
        action:
          type: string
          description: "Debe ser 'merge'"
        thread_id:
          type: integer
          description: "ID del hilo origen (se eliminara)"
        target_thread_id:
          type: integer
          description: "ID del hilo destino (recibira los mensajes)"
      required: ["action", "thread_id", "target_thread_id"]

    PauseCampaignArgs:
      description: |
        **pause_campaign** [mass_marketing] (mutation)
        Pausa temporalmente una campana de marketing masivo en curso
      type: object
      properties:
        action:
          type: string
          description: "Accion fija: pause"
        campaign_id:
          type: integer
          description: "ID de la campana a pausar"
      required: ["action", "campaign_id"]

    PrecheckDeleteWhatsappSessionArgs:
      description: |
        **precheck_delete_whatsapp_session** [whatsapp_ops] (query)
        Muestra qué configuraciones se verían afectadas al eliminar una sesión de WhatsApp (workflows, campañas, seguimiento inteligente) y lista las sesiones alternativas disponibles para migración. IMPORTANTE: Solo se pueden eliminar sesiones en estado 'disconnected'. Si la sesion esta conectada, informa al usuario que primero debe desconectarla desde el panel de WhatsApp antes de poder eliminarla.
      type: object
      properties:
        session_id:
          type: integer
          description: "ID de la sesión a verificar"
      required: ["session_id"]

    PreviewSmartFollowupArgs:
      description: |
        **preview_smart_followup** [smart_followup] (query)
        Genera una vista previa del mensaje de seguimiento que se enviaria a un cliente sin enviarlo realmente
      type: object
      properties:
        conversation_hash:
          type: string
          description: "Hash de la conversacion a analizar"
      required: ["conversation_hash"]

    PublishQuestionAsFaqArgs:
      description: |
        **publish_question_as_faq** [plugins] (mutation)
        Publica manualmente una pregunta del historial como FAQ en tu tienda online. Util para promover preguntas importantes que no fueron detectadas automaticamente.
      type: object
      properties:
        question_id:
          type: integer
          description: "ID de la pregunta a publicar (obtener de get_product_qa_questions)"
      required: ["question_id"]

    ReconnectWhatsappArgs:
      description: |
        **reconnect_whatsapp** [automation] (mutation)
        Intenta reconectar una sesion de WhatsApp existente (puede requerir escanear QR manualmente). Si hay multiples numeros, requiere session_id.
      type: object
      properties:
        session_id:
          type: integer
          description: "ID de la sesion a reconectar. Obligatorio si hay mas de un numero. Usa get_whatsapp_status para obtener los IDs."

    RegenerateApiKeyArgs:
      description: |
        **regenerate_api_key** [advanced] (mutation)
        Genera una nueva API key (token_ext) para la tienda. Esto invalida la key actual e impide el acceso de cualquier conexion MCP o aplicacion que la use. Usar solo si el usuario lo pide explicitamente.
        ⚠️ Requires confirmation
      type: object
      properties:
        confirmation:
          type: boolean
          description: "Debe ser true para confirmar la regeneracion"
        confirm:
          type: boolean
          description: "Confirmar la regeneracion del token"
      required: ["confirmation"]

    RegenerateDocqaTokenArgs:
      description: |
        **regenerate_docqa_token** [plugins] (mutation)
        Genera un nuevo token de acceso para un asistente Doc-QA
        ⚠️ Requires confirmation
      type: object
      properties:
        assistant_id:
          type: integer
          description: "ID del asistente Doc-QA"
      required: ["assistant_id"]

    RegeneratePluginTokenArgs:
      description: |
        **regenerate_plugin_token** [plugins] (mutation)
        Genera un nuevo token para los plugins (invalida el anterior)
        ⚠️ Requires confirmation
      type: object
      properties:
        plugin_type:
          type: string
          description: "Tipo de plugin cuyo token regenerar"
          enum: ["chat", "product-qa"]
          default: "chat"

    RejectKnowledgeSnippetArgs:
      description: |
        **reject_knowledge_snippet** [knowledge] (mutation)
        Rechaza un snippet de conocimiento pendiente
      type: object
      properties:
        action:
          type: string
          description: "Accion fija"
        id:
          type: integer
          description: "ID del snippet a rechazar"
      required: ["action", "id"]

    RemoveContactFromListArgs:
      description: |
        **remove_contact_from_list** [mass_marketing] (mutation)
        Elimina un contacto individual de una lista de marketing
      type: object
      properties:
        action:
          type: string
        contact_id:
          type: integer
          description: "ID del contacto a eliminar"
      required: ["action", "contact_id"]

    RemoveContactsBulkArgs:
      description: |
        **remove_contacts_bulk** [mass_marketing] (mutation)
        Elimina múltiples contactos de una lista de marketing
      type: object
      properties:
        action:
          type: string
        list_id:
          type: integer
          description: "ID de la lista"
        contact_ids:
          type: array
          description: "Array de IDs de contactos a eliminar"
        select_all:
          type: boolean
          description: "Seleccionar todos los contactos"
        exclude_ids:
          type: array
          description: "IDs a excluir cuando select_all=true"
        search:
          type: string
          description: "Filtro de búsqueda aplicado"
      required: ["action", "list_id"]

    RemoveCustomerTagArgs:
      description: |
        **remove_customer_tag** [customers] (mutation)
        Elimina una etiqueta (tag) de un cliente
      type: object
      properties:
        action:
          type: string
          description: "Accion fija"
        phone:
          type: string
          description: "Numero de telefono del cliente"
        tag_name:
          type: string
          description: "Nombre del tag a eliminar"
        comment:
          type: string
          description: "Texto del comentario"
        agent_name:
          type: string
          description: "Nombre del agente"
        query:
          type: string
          description: "Texto de busqueda"
        limit:
          type: integer
          description: "Maximo de resultados"
        tag_color:
          type: string
          description: "Color del tag en formato hexadecimal"
        primary_phone:
          type: string
          description: "Telefono principal para merge"
        secondary_phone:
          type: string
          description: "Telefono secundario para merge"
      required: ["action", "phone", "tag_name"]

    RemoveFromBlacklistArgs:
      description: |
        **remove_from_blacklist** [mass_marketing] (mutation)
        Desbloquea un numero de telefono de la lista negra de marketing masivo
      type: object
      properties:
        action:
          type: string
          description: "Accion fija: remove"
        phone:
          type: string
          description: "Numero de telefono a desbloquear"
      required: ["action", "phone"]

    RemoveUnsubscribedBulkArgs:
      description: |
        **remove_unsubscribed_bulk** [mass_marketing] (mutation)
        Elimina registros de bajas de marketing masivo
      type: object
      properties:
        action:
          type: string
        ids:
          type: array
          description: "Array de IDs de registros de baja a eliminar"
        select_all:
          type: boolean
          description: "Seleccionar todos los registros (usa filtros search/date_from/date_to para limitar)"
        search:
          type: string
          description: "Filtro por telefono (usado con select_all=true para limitar el alcance)"
        date_from:
          type: string
          description: "Fecha inicio filtro (formato YYYY-MM-DD, usado con select_all=true)"
        date_to:
          type: string
          description: "Fecha fin filtro (formato YYYY-MM-DD, usado con select_all=true)"
        exclude_ids:
          type: array
          description: "IDs a excluir de la eliminacion masiva (usado con select_all=true)"
      required: ["action"]

    RemoveWhatsappOptoutArgs:
      description: |
        **remove_whatsapp_optout** [whatsapp_ops] (mutation)
