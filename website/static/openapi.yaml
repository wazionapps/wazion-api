paths:
  /:
    post:
      operationId: jsonRpcRequest
      summary: JSON-RPC 2.0 endpoint
      description: |
        All WAzion API operations go through this single endpoint using JSON-RPC 2.0.

        ### Available methods

        | Method | Auth Required | Description |
        |--------|--------------|-------------|
        | `initialize` | No | MCP handshake |
        | `tools/list` | Yes | List all available tools |
        | `tools/call` | Yes | Execute a tool |
        | `resources/list` | Yes | List available resources |
        | `resources/read` | Yes | Read a resource (e.g. shop://profile) |
        | `ping` | Yes | Health check |

        ### Tool execution

        Use `tools/call` with `params.name` set to the tool name and `params.arguments`
        containing the tool parameters.

        ### Confirmations

        Some destructive actions require confirmation. On the first call, the server
        returns a warning message. Call again with `confirm: true` in the arguments
        to execute.

        ### Batch requests

        You can send an array of JSON-RPC requests for batch processing.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/JsonRpcRequest'
                - type: array
                  items:
                    $ref: '#/components/schemas/JsonRpcRequest'
            examples:
              initialize:
                summary: MCP handshake
                value:
                  jsonrpc: "2.0"
                  method: initialize
                  params:
                    protocolVersion: "2025-03-26"
                    capabilities: {}
                    clientInfo:
                      name: my-app
                      version: "1.0.0"
                  id: 1

              tools_list:
                summary: List all tools
                value:
                  jsonrpc: "2.0"
                  method: tools/list
                  params: {}
                  id: 2

              send_message:
                summary: Send a WhatsApp message
                value:
                  jsonrpc: "2.0"
                  method: tools/call
                  params:
                    name: send_whatsapp_message
                    arguments:
                      phone: "+34600000000"
                      message: "Hello from WAzion API!"
                      session_id: 1
                  id: 3

              list_conversations:
                summary: List recent conversations
                value:
                  jsonrpc: "2.0"
                  method: tools/call
                  params:
                    name: get_recent_conversations
                    arguments:
                      limit: 10
                  id: 4

              create_workflow:
                summary: Create a WhatsApp workflow
                value:
                  jsonrpc: "2.0"
                  method: tools/call
                  params:
                    name: create_whatsapp_workflow
                    arguments:
                      name: Welcome Message
                      trigger_type: message_received
                      conditions:
                        - type: keyword
                          value: hello
                      actions:
                        - type: reply_text
                          value: "Welcome! How can I help you?"
                      status: active
                      session_id: 1
                  id: 5

              get_ai_summary:
                summary: Get AI conversation summary
                value:
                  jsonrpc: "2.0"
                  method: tools/call
                  params:
                    name: get_ai_summary
                    arguments:
                      phone: "+34600000000"
                      summary_type: detailed
                  id: 6

              read_resource:
                summary: Read shop profile resource
                value:
                  jsonrpc: "2.0"
                  method: resources/read
                  params:
                    uri: "shop://profile"
                  id: 7

      responses:
        '200':
          description: JSON-RPC response
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/JsonRpcSuccessResponse'
                  - $ref: '#/components/schemas/JsonRpcErrorResponse'
                  - type: array
                    items:
                      oneOf:
                        - $ref: '#/components/schemas/JsonRpcSuccessResponse'
                        - $ref: '#/components/schemas/JsonRpcErrorResponse'
              examples:
                tool_success:
                  summary: Successful tool call
                  value:
                    jsonrpc: "2.0"
                    result:
                      content:
                        - type: text
                          text: "Message sent successfully"
                    id: 3
                tool_error:
                  summary: Tool error
                  value:
                    jsonrpc: "2.0"
                    result:
                      content:
                        - type: text
                          text: "Error: phone is required"
                      isError: true
                    id: 3
                auth_error:
                  summary: Authentication error
                  value:
                    jsonrpc: "2.0"
                    error:
                      code: -32000
                      message: "Unauthorized: invalid or missing Bearer token."
                    id: 1

        '202':
          description: Notification acknowledged (no response body)
        '405':
          description: Method not allowed (only POST is supported)

    delete:
      operationId: terminateSession
      summary: Terminate MCP session (no-op, server is stateless)
      responses:
        '202':
          description: Session terminated

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        Your WAzion API token. Find it at https://www.wazion.com/dashboard → Settings.

  schemas:
    JsonRpcRequest:
      type: object
      required:
        - jsonrpc
        - method
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        method:
          type: string
          enum:
            - initialize
            - tools/list
            - tools/call
            - resources/list
            - resources/read
            - ping
        params:
          type: object
          description: Method-specific parameters
        id:
          oneOf:
            - type: string
            - type: integer
          description: Request ID (omit for notifications)

    JsonRpcSuccessResponse:
      type: object
      required:
        - jsonrpc
        - result
        - id
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        result:
          type: object
        id:
          oneOf:
            - type: string
            - type: integer

    JsonRpcErrorResponse:
      type: object
      required:
        - jsonrpc
        - error
        - id
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        error:
          $ref: '#/components/schemas/JsonRpcError'
        id:
          oneOf:
            - type: string
            - type: integer
            - type: "null"

    JsonRpcError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          description: |
            Error codes:
            - `-32700` Parse error (invalid JSON)
            - `-32601` Method not found
            - `-32602` Invalid params
            - `-32000` Unauthorized
        message:
          type: string

    ToolCallParams:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Tool name (e.g. `send_whatsapp_message`)
        arguments:
          type: object
          description: Tool-specific arguments
          additionalProperties: true

    McpToolResult:
      type: object
      properties:
        content:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                const: text
              text:
                type: string
        isError:
          type: boolean
          description: Present and true when the tool call failed

    InitializeResult:
      type: object
      properties:
        protocolVersion:
          type: string
          example: "2025-03-26"
        capabilities:
          type: object
          properties:
            tools:
              type: object
              properties:
                listChanged:
                  type: boolean
            resources:
              type: object
              properties:
                subscribe:
                  type: boolean
                listChanged:
                  type: boolean
        serverInfo:
          type: object
          properties:
            name:
              type: string
              example: wazion-mcp
            version:
              type: string
              example: "1.1.0"
        instructions:
          type: string

    ToolDefinition:
      type: object
      properties:
        name:
          type: string
          description: Tool identifier
        description:
          type: string
        inputSchema:
          type: object
          description: JSON Schema for tool arguments
